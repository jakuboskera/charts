apiVersion: {{ include "common.capabilities.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: todo
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels: {{- include "common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "common.labels.standard" . | nindent 8 }}
        {{- if .Values.commonLabels }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 8 }}
        {{- end }}
        {{- if .Values.podLabels }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podLabels "context" $) | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podAnnotations "context" $) | nindent 8 }}
        {{- end }}
    spec:
      {{- include "todo.imagePullSecrets" . | nindent 6 }}
      {{- if eq .Values.config "prod" }}
      initContainers:
      - name: db-readiness
        image: {{ include "todo.dbReadiness.image" . }}
        imagePullPolicy: {{ .Values.dbReadiness.image.pullPolicy | quote }}
        command:
        - sh
        - -c
        - |
          until nc -z -w 5 {{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }} {{ .Values.global.postgresql.service.ports.postgresql }}; do
            echo "Waiting for PostgreSQL {{ .Release.Name }}-postgresql to accept connections..."
            sleep 2
          done
          echo "PostgreSQL is ready!"
        {{- if .Values.dbReadiness.resources }}
        resources: {{- toYaml .Values.dbReadiness.resources | nindent 12 }}
        {{- end }}
      {{- end }}
      containers:
      - name: todo
        image: {{ include "todo.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        env:
          - name: TODO_CONFIG
            valueFrom:
              configMapKeyRef:
                name: {{ include "common.names.fullname" . }}
                key: todoConfig
          {{- if eq .Values.config "prod" }}
          - name: DATABASE_URL
            value: {{ printf "%s://%s:%s@%s:%d/%s" "postgresql" .Values.global.postgresql.auth.username .Values.global.postgresql.auth.password (printf "%s-%s" .Release.Name "postgresql") (int .Values.global.postgresql.service.ports.postgresql) .Values.global.postgresql.auth.database }}
          {{- end }}
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: {{ include "common.names.fullname" . }}
                key: apiKey
        ports:
        - name: http
          containerPort: 5000
        resources: {{- toYaml .Values.resources | nindent 12 }}
