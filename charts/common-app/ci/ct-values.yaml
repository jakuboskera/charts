image:
  registry: docker.io/library
  repository: nginx
  tag: latest

service:
  type: ClusterIP
  port: 80

env:
  TEST_VAR: "hello"

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
